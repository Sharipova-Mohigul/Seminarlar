<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminarlar - EventSphere</title>
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950">
    <!-- Common Header Container (Will be injected by app.js or similar) -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 group">
                <div class="bg-primary p-2 rounded-xl group-hover:rotate-12 transition-transform text-white">
                    <i data-lucide="calendar" class="w-6 h-6"></i>
                </div>
                <span class="text-2xl font-display font-black text-white italic">EventSphere</span>
            </a>
            <div class="flex items-center gap-8">
                <a href="/" class="text-sm font-bold text-gray-400 hover:text-white transition-colors">Home</a>
                <a href="/frontend/pages/events.html" class="text-sm font-bold text-primary">Seminarlar</a>
                <div id="user-nav" class="flex items-center gap-4"></div>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-16">
            <div class="max-w-xl">
                <h1 class="text-5xl font-display font-black text-white mb-4 italic">Barcha <span class="gradient-text">Seminarlar</span></h1>
                <p class="text-gray-500 font-medium tracking-wide">Yangi bilimlar va tajribalar olami. O'zingizga qulay vaqtni tanlang.</p>
            </div>
            <div class="w-full md:w-96">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i>
                    <input type="text" id="search-input" placeholder="Tadbirni qidiring..." class="w-full pl-12 pr-6 py-4 bg-gray-900 border border-gray-800 rounded-2xl text-white focus:ring-2 focus:ring-primary outline-none transition-all">
                </div>
            </div>
        </div>

        <!-- Grid -->
        <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Events injected here -->
        </div>
        
        <div id="events-loading" class="text-center py-20 hidden">
             <div class="inline-block animate-spin w-12 h-12 border-4 border-primary border-t-transparent rounded-full"></div>
        </div>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-bg/80 backdrop-blur-xl"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="card-vibrant max-w-md w-full bg-gray-900 border-2 border-white/5 shadow-3xl">
                <div class="flex justify-between items-start mb-8">
                    <h3 class="text-2xl text-white font-black italic">Joy band qilish</h3>
                    <button id="close-modal" class="p-2 hover:bg-gray-800 rounded-xl text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
                </div>
                <p id="modal-event-name" class="text-primary font-bold text-lg mb-8"></p>
                <form id="booking-form" class="space-y-6">
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Ism Sharif</label>
                        <input type="text" id="book-name" required class="w-full px-5 py-4 bg-gray-800 border-gray-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-secondary">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Bog'lanish uchun Email</label>
                        <input type="email" id="book-email" required class="w-full px-5 py-4 bg-gray-800 border-gray-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-secondary">
                    </div>
                    <button type="submit" class="btn-vibrant btn-accent w-full mt-4 font-black uppercase tracking-tighter text-lg">
                        Bronni tasdiqlash
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 right-8 z-[100] transform translate-y-24 transition-all duration-500 pointer-events-none">
        <div class="bg-gray-900 border border-primary/20 shadow-2xl rounded-2xl p-6 flex items-center gap-4">
             <div class="bg-primary/20 p-2 rounded-xl text-primary"><i id="toast-icon" data-lucide="check"></i></div>
             <span id="toast-message" class="text-white font-bold">Muvaffaqiyatli!</span>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
