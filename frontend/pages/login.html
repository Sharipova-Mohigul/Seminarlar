<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - EventSphere</title>
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen p-6 font-sans text-gray-200 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-96 h-96 bg-primary/10 blur-[120px] rounded-full translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-accent/10 blur-[120px] rounded-full -translate-x-1/2 translate-y-1/2"></div>

    <div class="card-vibrant bg-gray-900 border-white/5 max-w-md w-full p-12 relative z-10">
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-accent/10 text-accent mb-8 border border-accent/20 shadow-xl shadow-accent/10">
                <i data-lucide="lock" class="w-12 h-12"></i>
            </div>
            <h1 class="text-4xl font-display font-black text-white italic tracking-tighter">Xush <span class="text-accent italic">Kelibsiz</span></h1>
            <p class="text-gray-500 mt-4 font-medium italic">Tizimga kirish uchun malumotlaringizni kiriting</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 px-1">Email manzili</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-6 flex items-center text-gray-600 group-focus-within:text-accent transition-colors">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </span>
                    <input type="email" id="email" required placeholder="mail@example.com" class="block w-full pl-14 pr-6 py-4 bg-gray-800 border border-gray-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-accent transition-all">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 px-1">Parol</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-6 flex items-center text-gray-600 group-focus-within:text-accent transition-colors">
                        <i data-lucide="key" class="w-5 h-5"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••" class="block w-full pl-14 pr-6 py-4 bg-gray-800 border border-gray-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-accent transition-all">
                </div>
            </div>

            <button type="submit" class="btn-vibrant btn-accent w-full !py-4 font-black uppercase text-lg italic tracking-tighter mt-4">
                Kirish
            </button>
        </form>

        <div class="mt-12 text-center border-t border-white/5 pt-10">
            <p class="text-gray-500 font-medium">Hisobingiz yo'qmi? <a href="/frontend/pages/register.html" class="text-accent font-black uppercase tracking-widest text-[10px] hover:text-white transition-colors ml-2">Ro'yxatdan o'tish</a></p>
            <a href="/" class="inline-block mt-8 text-[10px] font-black uppercase tracking-[0.2em] text-gray-600 hover:text-gray-300 transition-colors">← Bosh sahifaga qaytish</a>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
