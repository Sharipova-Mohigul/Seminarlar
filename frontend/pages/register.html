<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - EventSphere</title>
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen p-6 font-sans text-gray-200 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-96 h-96 bg-primary/10 blur-[120px] rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-secondary/10 blur-[120px] rounded-full translate-x-1/2 translate-y-1/2"></div>

    <div class="card-vibrant bg-gray-900 border-white/5 max-w-md w-full p-12 relative z-10">
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-primary/10 text-primary mb-8 border border-primary/20 shadow-xl shadow-primary/10">
                <i data-lucide="user-plus" class="w-12 h-12"></i>
            </div>
            <h1 class="text-4xl font-display font-black text-white italic tracking-tighter">Event<span class="text-primary italic">Sphere</span></h1>
            <p class="text-gray-500 mt-4 font-medium italic">Barcha imkoniyatlardan foydalanish uchun hisob yarating</p>
        </div>

        <form id="register-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 px-1">Ismingiz</label>
                <input type="text" id="name" required placeholder="John Doe" class="block w-full px-6 py-4 bg-gray-800 border border-gray-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-secondary transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 px-1">Email manzili</label>
                <input type="email" id="email" required placeholder="mail@example.com" class="block w-full px-6 py-4 bg-gray-800 border border-gray-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-secondary transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 px-1">Parol (min 6 belgi)</label>
                <input type="password" id="password" required minlength="6" placeholder="••••••••" class="block w-full px-6 py-4 bg-gray-800 border border-gray-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-secondary transition-all">
            </div>

            <button type="submit" class="btn-vibrant btn-primary w-full !py-4 font-black uppercase text-lg italic tracking-tighter mt-6">
                Ro'yxatdan o'tish
            </button>
        </form>

        <div class="mt-12 text-center border-t border-white/5 pt-10">
            <p class="text-gray-500 font-medium">Hisobingiz bormi? <a href="/frontend/pages/login.html" class="text-primary font-black uppercase tracking-widest text-[10px] hover:text-white transition-colors ml-2">Kirish</a></p>
        </div>
    </div>

    <script type="module" src="/frontend/js/api.js"></script>
    <script type="module" src="/frontend/js/auth.js"></script>
    <script type="module">
        lucide.createIcons();
    </script>
</body>
</html>
